<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 480px;
      padding: 32px 28px 28px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a202c;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    h1 span.icon {
      font-size: 1.8rem;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
      color: #2d3748;
    }

    .input-row input:focus {
      border-color: #667eea;
    }

    .input-row input::placeholder {
      color: #a0aec0;
    }

    .input-row button {
      padding: 12px 20px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .input-row button:hover {
      background: #5a67d8;
    }

    .input-row button:active {
      transform: scale(0.96);
    }

    .stats {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 12px;
      padding: 0 2px;
    }

    .stats .done-count {
      color: #48bb78;
      font-weight: 600;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 14px;
      border-radius: 10px;
      margin-bottom: 8px;
      background: #f7fafc;
      border: 1.5px solid #e2e8f0;
      transition: background 0.2s, border-color 0.2s, opacity 0.2s;
    }

    li.checked {
      background: #f0fff4;
      border-color: #9ae6b4;
      opacity: 0.75;
    }

    li input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #48bb78;
      cursor: pointer;
      flex-shrink: 0;
    }

    li .item-text {
      flex: 1;
      font-size: 1rem;
      color: #2d3748;
      word-break: break-word;
      transition: color 0.2s;
    }

    li.checked .item-text {
      text-decoration: line-through;
      color: #a0aec0;
    }

    li .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #cbd5e0;
      font-size: 1.1rem;
      padding: 4px 6px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
      line-height: 1;
    }

    li .delete-btn:hover {
      color: #fc8181;
      background: #fff5f5;
    }

    .empty-state {
      text-align: center;
      padding: 36px 0;
      color: #a0aec0;
    }

    .empty-state .big-icon {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    .empty-state p {
      font-size: 0.95rem;
    }

    .clear-btn {
      width: 100%;
      margin-top: 20px;
      padding: 10px;
      background: none;
      border: 1.5px solid #fed7d7;
      border-radius: 10px;
      color: #fc8181;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .clear-btn:hover {
      background: #fff5f5;
      color: #e53e3e;
    }

    .loading {
      text-align: center;
      padding: 20px 0;
      color: #a0aec0;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1><span class="icon">🛒</span> 쇼핑 리스트</h1>

    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템 입력..." maxlength="80">
      <button onclick="addItem()">추가</button>
    </div>

    <div class="stats">
      <span id="totalCount">총 0개</span>
      <span class="done-count" id="doneCount">완료 0개</span>
    </div>

    <ul id="list"></ul>

    <div id="emptyState" class="empty-state" style="display:none">
      <div class="big-icon">🧺</div>
      <p>리스트가 비어 있어요.<br>위에서 아이템을 추가해 보세요!</p>
    </div>

    <button class="clear-btn" id="clearBtn" style="display:none" onclick="clearChecked()">
      완료된 항목 모두 삭제
    </button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://sbckcduophjhmwckjian.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNiY2tjZHVvcGhqaG13Y2tqaWFuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1MjQ2NjgsImV4cCI6MjA5ODEwMDY2OH0.T3Nwaw9uK-p0nIw70gKYwhEtYyXkV0S9uNs-J-pdMM0';

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_KEY);

    const listEl = document.getElementById('list');
    const inputEl = document.getElementById('itemInput');
    const emptyState = document.getElementById('emptyState');
    const clearBtn = document.getElementById('clearBtn');
    const totalCountEl = document.getElementById('totalCount');
    const doneCountEl = document.getElementById('doneCount');

    let items = [];

    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    function render() {
      listEl.innerHTML = '';

      items.forEach(item => {
        const li = document.createElement('li');
        if (item.checked) li.classList.add('checked');

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = item.checked;
        cb.addEventListener('change', () => toggle(item.id, !item.checked));

        const span = document.createElement('span');
        span.className = 'item-text';
        span.textContent = item.text;

        const btn = document.createElement('button');
        btn.className = 'delete-btn';
        btn.textContent = '✕';
        btn.title = '삭제';
        btn.addEventListener('click', () => remove(item.id));

        li.append(cb, span, btn);
        listEl.appendChild(li);
      });

      const total = items.length;
      const done = items.filter(i => i.checked).length;
      totalCountEl.textContent = `총 ${total}개`;
      doneCountEl.textContent = `완료 ${done}개`;
      emptyState.style.display = total === 0 ? 'block' : 'none';
      clearBtn.style.display = done > 0 ? 'block' : 'none';
    }

    async function loadItems() {
      const { data, error } = await db
        .from('shopping_items')
        .select('*')
        .order('created_at', { ascending: true });

      if (error) { console.error(error); return; }
      items = data;
      render();
    }

    async function addItem() {
      const text = inputEl.value.trim();
      if (!text) { inputEl.focus(); return; }

      const { data, error } = await db
        .from('shopping_items')
        .insert({ text, checked: false })
        .select()
        .single();

      if (error) { console.error(error); return; }
      items.push(data);
      inputEl.value = '';
      inputEl.focus();
      render();
    }

    async function toggle(id, checked) {
      const { error } = await db
        .from('shopping_items')
        .update({ checked })
        .eq('id', id);

      if (error) { console.error(error); return; }
      items = items.map(i => i.id === id ? { ...i, checked } : i);
      render();
    }

    async function remove(id) {
      const { error } = await db
        .from('shopping_items')
        .delete()
        .eq('id', id);

      if (error) { console.error(error); return; }
      items = items.filter(i => i.id !== id);
      render();
    }

    async function clearChecked() {
      const checkedIds = items.filter(i => i.checked).map(i => i.id);
      const { error } = await db
        .from('shopping_items')
        .delete()
        .in('id', checkedIds);

      if (error) { console.error(error); return; }
      items = items.filter(i => !i.checked);
      render();
    }

    loadItems();
  </script>
</body>
</html>
